<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정부24</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f2f3f5;
}

/* 상단 */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:white;
  font-weight:bold;
}

/* 카드 */
.container {
  padding:20px;
}

.card {
  background:white;
  border-radius:20px;
  padding:25px;
  max-width:420px;
  margin:0 auto;
  min-height:350px;
  position:relative;
}

/* 🔥 사진 크게 */
#profile {
  width:150px;
  height:150px;
  border-radius:12px;
  object-fit:cover;
  display:block;
  margin:0 auto 15px auto;
}

/* 텍스트 */
.name {
  font-size:22px;
  font-weight:bold;
}

.info {
  font-size:14px;
  color:#555;
}

/* QR */
#qr {
  position:absolute;
  right:20px;
  bottom:20px;
  width:110px;
  height:110px;
  display:none;
}

/* 하단 */
.bottom {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:15px;
  background:#f2f3f5;
}

/* 타이머 */
.timer {
  margin-bottom:10px;
}

.bar {
  height:6px;
  background:#ddd;
  border-radius:5px;
  overflow:hidden;
}

.bar-inner {
  height:100%;
  width:100%;
  background:linear-gradient(to right,blue,purple);
}

/* 버튼 */
.btn {
  width:100%;
  background:black;
  color:white;
  padding:16px;
  text-align:center;
  border-radius:12px;
}

/* 🔥 설정 화면 */
#settings {
  display:none;
  padding:20px;
}

input {
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="header">
  <div>정부24</div>
  <div id="menuBtn">≡</div>
</div>

<!-- 메인 -->
<div class="container">
  <div class="card">

    <img id="profile" src="https://placehold.co/150">

    <div class="name" id="name">홍길동</div>
    <div class="info" id="dob">20000101-******</div>
    <div class="info" id="addr">********</div>

    <div id="qr"></div>

  </div>
</div>

<div class="bottom">

  <div class="timer">
    <div id="timeText">30초</div>
    <div class="bar">
      <div class="bar-inner" id="bar"></div>
    </div>
  </div>

  <div class="btn" onclick="toggle()" id="btn">
    QR 표시
  </div>

</div>

<!-- 🔥 설정 -->
<div id="settings">
  <h3>설정</h3>

  이름 <input id="setName">
  생년월일 앞 <input id="setDob1">
  생년월일 뒤 <input id="setDob2">
  주소 <input id="setAddr">
  사진 <input type="file" id="setImg">

  <button onclick="save()">저장</button>
</div>

<script>
let isQR=false;

function makeQR(){
  const qr=document.getElementById("qr");
  qr.innerHTML="";
  new QRCode(qr,{
    text:"QR-ID",
    width:110,
    height:110
  });
}

function toggle(){
  const qr=document.getElementById("qr");
  const dob=document.getElementById("dob");
  const addr=document.getElementById("addr");
  const btn=document.getElementById("btn");

  if(!isQR){
    makeQR();
    qr.style.display="block";
    dob.innerText="20000101-******";
    addr.innerText="********";
    btn.innerText="상세정보 표시";
    isQR=true;
  } else {
    qr.style.display="none";
    dob.innerText="20000101-1234567";
    addr.innerText="서울시 강남구";
    btn.innerText="QR 표시";
    isQR=false;
  }
}

/* 타이머 */
let time=30;
setInterval(()=>{
  time--;
  if(time<0) time=30;

  document.getElementById("timeText").innerText=time+"초";
  document.getElementById("bar").style.width=(time/30*100)+"%";
},1000);

/* 🔥 설정 5번 */
let count=0;
let start=0;

document.getElementById("menuBtn").onclick=()=>{
  const now=Date.now();

  if(now-start>2000){
    count=1;
    start=now;
  } else {
    count++;
  }

  if(count>=5){
    document.querySelector(".container").style.display="none";
    document.querySelector(".bottom").style.display="none";
    document.getElementById("settings").style.display="block";
    count=0;
  }
};

/* 저장 */
function save(){
  const name=document.getElementById("setName").value;
  const dob1=document.getElementById("setDob1").value;
  const dob2=document.getElementById("setDob2").value;
  const addr=document.getElementById("setAddr").value;

  if(name) document.getElementById("name").innerText=name;
  if(dob1 && dob2){
    document.getElementById("dob").innerText=dob1+"-"+dob2;
  }
  if(addr) document.getElementById("addr").innerText=addr;

  const file=document.getElementById("setImg").files[0];
  if(file){
    const reader=new FileReader();
    reader.onload=(e)=>{
      document.getElementById("profile").src=e.target.result;
    };
    reader.readAsDataURL(file);
  }

  document.querySelector(".container").style.display="block";
  document.querySelector(".bottom").style.display="block";
  document.getElementById("settings").style.display="none";
}
</script>

</body>
</html>
