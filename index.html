<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* 상단 */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-size:22px;
  font-weight:bold;
}

/* 카드 */
.card{
  background:#fff;
  margin:20px;
  border-radius:20px;
  padding:20px;
}

/* 사진 */
.photo{
  width:160px;
  height:200px;
  object-fit:cover;
  border-radius:15px;
  display:block;
  margin:0 auto 20px;
}

/* 정보 */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.info{
  flex:1;
}

/* 🔥 글씨 스타일 */
#name{
  font-size:20px;
  font-weight:bold;
  margin-bottom:5px;
}

#birth{
  font-size:14px;
  color:#555;
}

#addr{
  font-size:14px;
  color:#555;
}

/* QR */
.qr{
  width:110px;
}

/* 타이머 */
.timer{
  padding:0 20px;
  text-align:center;
}

.bar{
  height:6px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
}

.fill{
  height:6px;
  background:linear-gradient(to right,#4facfe,#8e2de2);
  width:100%;
  border-radius:10px;
}

/* 버튼 */
.bottom{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
}

.btn{
  width:90%;
  padding:15px;
  background:black;
  color:white;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
}

/* 설정 */
.setting{
  position:fixed;
  top:0;
  right:-100%;
  width:80%;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

.setting.active{
  right:0;
}

input{
  width:100%;
  margin:10px 0;
  padding:10px;
}
</style>
</head>

<body>

<div class="header">
  모바일신분증
  <div id="menu">≡</div>
</div>

<div class="card">

  <img id="photo" class="photo">

  <div class="row">
    <div class="info">
      <div id="name">홍길동</div>
      <div id="birth">070907 - 1234567</div>
      <div id="addr">전주시 덕진구</div>
    </div>

    <img id="qr" class="qr">
  </div>

</div>

<!-- 🔥 타이머 위치 (버튼 위) -->
<div class="timer">
  남은시간 <span id="time">30</span>초
  <div class="bar">
    <div class="fill" id="bar"></div>
  </div>
</div>

<div class="bottom">
  <div class="btn" id="toggle">상세정보 표시</div>
</div>

<!-- 설정 -->
<div class="setting" id="setting">
  <h2>설정</h2>

  <input id="inputName" placeholder="이름">
  <input id="inputBirth" placeholder="생년월일">
  <input id="inputBack" placeholder="뒷자리">
  <input id="inputAddr" placeholder="주소">
  <input type="file" id="file">

  <button onclick="save()">저장</button>
</div>

<script>
let count=30;
let hidden=false;
let clickCount=0;

/* 타이머 */
function timer(){
  count--;
  if(count<=0) count=30;

  time.innerText=count;
  bar.style.width=(count/30*100)+"%";

  setTimeout(timer,1000);
}
timer();

/* QR */
function makeQR(){
  let data=name.innerText + birth.innerText;
  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+data;
}

/* 토글 */
toggle.onclick=function(){
  hidden=!hidden;

  if(hidden){
    birth.innerText="•••••• - •••••••";
    addr.innerText="••••••";
    qr.style.display="none";
    this.innerText="QR정보 표시";
  }else{
    birth.innerText=localStorage.birth+" - "+localStorage.back;
    addr.innerText=localStorage.addr;
    qr.style.display="block";
    this.innerText="상세정보 표시";
  }
};

/* 5번 클릭 설정 */
menu.onclick=function(){
  clickCount++;
  if(clickCount>=5){
    setting.classList.add("active");
    clickCount=0;
  }
};

/* 저장 */
function save(){
  localStorage.name=inputName.value;
  localStorage.birth=inputBirth.value;
  localStorage.back=inputBack.value;
  localStorage.addr=inputAddr.value;

  name.innerText=inputName.value;
  birth.innerText=inputBirth.value+" - "+inputBack.value;
  addr.innerText=inputAddr.value;

  makeQR();
  setting.classList.remove("active");
}

/* 사진 */
file.onchange=function(e){
  let reader=new FileReader();
  reader.onload=function(){
    photo.src=reader.result;
    localStorage.photo=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
};

/* 🔥 저장된 값 유지 (핵심) */
window.onload=function(){
  if(localStorage.name){
    name.innerText=localStorage.name;
    birth.innerText=localStorage.birth+" - "+localStorage.back;
    addr.innerText=localStorage.addr;
  }

  if(localStorage.photo){
    photo.src=localStorage.photo;
  }

  makeQR(); // QR 유지 핵심
};
</script>

</body>
</html>
