<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 신분증</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#f2f2f7;
}

/* 상단 */
.header{
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* 카드 */
.card{
  background:#fff;
  margin:15px;
  border-radius:20px;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
}

/* 사진 */
.profile{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
}

/* QR */
.qr{
  width:140px;
  margin:15px auto;
}

/* 텍스트 */
.name{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

/* 카운트 */
.timer{
  margin-top:10px;
  font-size:14px;
}

.bar{
  height:5px;
  background:#ddd;
  border-radius:10px;
  margin-top:5px;
}

.fill{
  height:5px;
  background:linear-gradient(to right,blue,purple);
  width:100%;
  border-radius:10px;
}

/* 하단 버튼 */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:15px;
  background:#f2f2f7;
}

button{
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:15px;
  font-size:16px;
  font-weight:bold;
}

.black{
  background:#000;
  color:#fff;
}

.gray{
  background:#444;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">모바일신분증</div>

<div class="card">

  <!-- 사진 -->
  <img id="photo" class="profile" src="">

  <!-- 이름 -->
  <div class="name">홍길동</div>

  <!-- QR -->
  <img id="qr" class="qr" src="">

  <!-- 카운트 -->
  <div class="timer">남은시간 <span id="time">30</span>초</div>

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

</div>

<!-- 하단 버튼 -->
<div class="bottom">
  <button class="black" onclick="toggle()">QR정보 표시</button>
  <button class="gray" onclick="toggle()">상세정보 표시</button>
</div>

<script>
let sec=30;
let mode="qr";

function makeQR(){
  document.getElementById("qr").src =
  "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+Date.now();
}

makeQR();

setInterval(()=>{
  sec--;
  if(sec<=0){
    sec=30;
    makeQR();
  }

  document.getElementById("time").innerText=sec;
  document.getElementById("fill").style.width=(sec/30*100)+"%";
},1000);

function toggle(){
  if(mode==="qr"){
    document.getElementById("qr").style.display="none";
    document.querySelector(".name").innerText="홍길동\n070907-3483511\n전주시";
    mode="info";
  }else{
    document.getElementById("qr").style.display="block";
    document.querySelector(".name").innerText="홍길동";
    mode="qr";
  }
}

/* 사진 업로드 */
document.getElementById("photo").addEventListener("click",()=>{
  let input=document.createElement("input");
  input.type="file";
  input.accept="image/*";

  input.onchange=e=>{
    let file=e.target.files[0];
    let reader=new FileReader();

    reader.onload=function(e){
      document.getElementById("photo").src=e.target.result;
    };

    reader.readAsDataURL(file);
  };

  input.click();
});
</script>

</body>
</html>
